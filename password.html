<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password required — Lesley Rooney</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0A0A0A;
      --ink-mid: #4A4A4A;
      --ink-light: #717171;
      --paper: #f5f5f5;
      --rule: #e2e0d8;
      --serif: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    body {
      font-family: var(--serif);
      background: #FDFDFC;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card { max-width: 420px; width: 100%; }
    .eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2rem);
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    p {
      font-size: 0.9rem;
      color: var(--ink-mid);
      margin-bottom: 36px;
      line-height: 1.65;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--rule);
      border-radius: 12px;
      font-size: 1rem;
      font-family: var(--serif);
      background: var(--paper);
      color: var(--ink);
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: var(--ink); }
    .error {
      color: #c0392b;
      font-size: 0.82rem;
      margin-bottom: 10px;
      display: none;
    }
    .error.visible { display: block; }
    button {
      width: 100%;
      padding: 14px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: var(--serif);
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .divider {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 32px 0;
    }
    .back {
      display: block;
      text-align: center;
      font-size: 0.8rem;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back:hover { color: var(--ink); }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">Lesley Rooney — Senior Product Designer</p>
    <h1>Password required</h1>
    <p>This case study is restricted. Enter the code to view it — you would have received this from me directly.</p>
    <form method="POST" action="/check-password">
      <input type="hidden" name="dest" id="dest">
      <input
        type="password"
        name="code"
        placeholder="Enter code"
        autocomplete="off"
        autofocus
      >
      <p class="error" id="error">Incorrect code — try again, or get in touch if you need the password.</p>
      <button type="submit">View case study &rarr;</button>
    </form>
    <hr class="divider">
    <a href="/" class="back">&larr; Back to work</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('dest').value = params.get('dest') || '/';
    if (params.get('error')) document.getElementById('error').classList.add('visible');
  </script>
</body>
</html>
